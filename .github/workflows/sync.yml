# .github/workflows/sync.yml
name: Sync to repo with separate pages (go.emeland.io)
on:
  push:
    branches:
      - main
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v6
     - name: Setup SSH Configuration
       shell: bash
       with:
         mirror-ssh-key: ${{ secrets.MIRROR_REPO_SSH_KEY }}
       run: |
         mkdir -p ~/.ssh
         chmod 700 ~/.ssh

         # Write the SSH keys
         echo "${{ inputs.mirror-ssh-key }}" > ~/.ssh/mirror_key
         chmod 600 ~/.ssh/*_key

         # Create SSH config with host aliases
         cat > ~/.ssh/config << 'EOF'
         Host github-mirror
           HostName github.com
           User git
           IdentityFile ~/.ssh/mirror_key
           IdentitiesOnly yes
         
         EOF

         chmod 600 ~/.ssh/config
         ssh-keyscan github.com >> ~/.ssh/known_hosts

     - run: |
         git remote add public git@github-mirror:go-emeland-io2/go-libraries.git
         git push public main
