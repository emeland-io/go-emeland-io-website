# .github/workflows/sync.yml
name: Sync to repo with separate pages (go.emeland.io)
on:
  push:
    branches:
      - main
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v6
     - name: Setup SSH Configuration
       shell: bash
       env:
         MIRROR_SSH_KEY: ${{ secrets.MIRROR_REPO_SSH_KEY }}
       run: |
         mkdir -p ~/.ssh
         chmod 700 ~/.ssh

         # Write the SSH keys
         echo "$MIRROR_SSH_KEY" > ~/.ssh/mirror_key
         chmod 600 ~/.ssh/*_key

         # Create SSH config with host aliases
         cat > ~/.ssh/config << 'EOF'
         Host github-mirror
           HostName github.com
           User git
           IdentityFile ~/.ssh/mirror_key
           IdentitiesOnly yes
         
         EOF

         chmod 600 ~/.ssh/config
         ssh-keyscan github.com >> ~/.ssh/known_hosts

     - name: do the actual push
       shell: bash
       env: 
         SYNC_BRANCHES: main
       run: |
         git remote add public git@github-mirror:go-emeland-io2/go-libraries.git
         git fetch public

         for branch in ${SYNC_BRANCHES}; do
           echo "Syncing $branch..."

           # Start from remote branch
           git checkout -B $branch public/$branch

           # Rebase changes from local repo 
           git pull origin $branch --rebase

           # Push to repo
           git push public $branch

           echo "✓ $branch synced"
         done
