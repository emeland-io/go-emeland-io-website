# .github/workflows/sync.yml
name: Sync to repo with separate pages (go.emeland.io)
on:
  push:
    branches:
      - main
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - run: |
        git remote add public git@github.com:go-emeland-io2/go-libraries.git
        git push public main
